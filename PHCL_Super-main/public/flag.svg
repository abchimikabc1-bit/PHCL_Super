<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background ya Zambarau Nzito -->
  <rect width="600" height="400" fill="#3b0764"/>
  <!-- Mstari wa Dhahabu wa diagonal -->
  <path d="M 0 0 L 250 0 L 600 400 L 350 400 Z" fill="#eab308" opacity="0.15"/>
  <!-- Nembo ya katikati inayong'aa -->
  <circle cx="300" cy="200" r="90" fill="#581c87" stroke="#eab308" stroke-width="4" filter="drop-shadow(0 0 10px rgba(234,179,8,0.5))"/>
  <!-- Ngao ya Dhahabu ndani -->
  <path d="M 300 150 L 340 170 L 340 215 C 340 240 300 255 300 255 C 300 255 260 240 260 215 L 260 170 Z" fill="none" stroke="#eab308" stroke-width="4"/>
  <!-- Maandishi ya PHCL ya Dhahabu -->
  <text x="300" y="205" font-family="sans-serif" font-size="20" font-weight="900" fill="#eab308" text-anchor="middle" letter-spacing="2">PHCL</text>
  <!-- Maandishi ya SUPER ya Bluu ya Kioo -->
  <text x="300" y="225" font-family="sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="1">SUPER</text>
  <!-- Nyota za Dhahabu, Bluu na Kijani -->
  <polygon points="300,120 304,130 314,130 306,136 309,146 300,140 291,146 294,136 286,130 296,130" fill="#eab308"/>
  <polygon points="180,100 183,108 191,108 185,113 187,121 180,116 173,121 175,113 169,108 177,108" fill="#60a5fa" opacity="0.6"/>
  <polygon points="420,300 423,308 431,308 425,313 427,321 420,316 413,321 415,313 409,308 417,308" fill="#4ade80" opacity="0.6"/>
</svg>
